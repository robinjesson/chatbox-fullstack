spring:
  application:
    name: azerty-api
  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: 7200000
    cookie-secure: ${JWT_COOKIE_SECURE:true}